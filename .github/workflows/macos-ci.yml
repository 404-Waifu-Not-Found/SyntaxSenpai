name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --prefer-frozen-lockfile

      - name: Rebuild native modules for Electron
        run: |
          # Ensure electron-rebuild is available; prefer workspace install but fall back to npx
          pnpm -w add -D electron-rebuild@3.2.0 || true
          pnpm -w exec electron-rebuild --force --parallel || pnpx electron-rebuild --force --parallel

      - name: Build required packages
        run: |
          pnpm --filter @syntax-senpai/waifu-core run build || true
          pnpm --filter @syntax-senpai/ai-core run build || true
          pnpm --filter syntax-senpai-desktop run build || true

      - name: Typecheck
        run: pnpm -w run typecheck || true

      - name: Smoke test
        run: echo "macOS build smoke test completed"
