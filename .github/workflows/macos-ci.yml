name: Desktop macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-desktop:
    name: Build desktop app on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --prefer-frozen-lockfile
      - name: Build desktop dependencies
        run: pnpm --filter @syntax-senpai/ai-core --filter @syntax-senpai/storage --filter @syntax-senpai/waifu-core --filter syntax-senpai-desktop run build
      - name: Desktop typecheck
        run: pnpm --filter syntax-senpai-desktop run typecheck
      - name: Desktop smoke build complete
        run: echo "Desktop macOS build completed"
