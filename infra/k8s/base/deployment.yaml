apiVersion: apps/v1
kind: Deployment
metadata:
  name: syntax-senpai-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: syntax-senpai-runtime
  template:
    metadata:
      labels:
        app: syntax-senpai-runtime
    spec:
      containers:
        - name: runtime
          image: ghcr.io/unoxyrich/syntax-senpai-runtime:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
              name: http
          envFrom:
            - configMapRef:
                name: syntax-senpai-runtime-config
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: syntax-senpai-data
